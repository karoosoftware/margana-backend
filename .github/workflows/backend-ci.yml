name: Backend CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    environment: preprod

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      STATIC_ASSETS_BUCKET: ${{ vars.STATIC_ASSETS_BUCKET }}
      BUILD_ARTIFACTS_BUCKET: ${{ vars.BUILD_ARTIFACTS_BUCKET }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show GitHub context
        run: |
          echo "repository=${{ github.repository }}"
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "actor=${{ github.actor }}"

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Verify bucket access
        run: |
          aws s3api head-bucket --bucket "$STATIC_ASSETS_BUCKET"
          aws s3api head-bucket --bucket "$BUILD_ARTIFACTS_BUCKET"

      - name: Download canonical backend assets
        run: |
          aws s3 cp "s3://$STATIC_ASSETS_BUCKET/margana-word-list.txt" ./margana-word-list.txt
          aws s3 cp "s3://$STATIC_ASSETS_BUCKET/horizontal-exclude-words.txt" ./horizontal-exclude-words.txt
          aws s3 cp "s3://$STATIC_ASSETS_BUCKET/letter-scores-v3.json" ./letter-scores-v3.json

          test -s ./margana-word-list.txt
          test -s ./horizontal-exclude-words.txt
          test -s ./letter-scores-v3.json