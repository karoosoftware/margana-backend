name: Backend CI

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'preprod' }}

    env:
      DEPLOY_ENV: ${{ github.ref_name == 'main' && 'prod' || 'preprod' }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      STATIC_ASSETS_BUCKET: ${{ vars.STATIC_ASSETS_BUCKET }}
      BUILD_ARTIFACTS_BUCKET: ${{ vars.BUILD_ARTIFACTS_BUCKET }}
      BUILD_ARTIFACTS_PREFIX: ${{ vars.BUILD_ARTIFACTS_PREFIX }}
      PYTHON_VERSION: "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Verify bucket access
        run: |
          aws s3api head-bucket --bucket "$STATIC_ASSETS_BUCKET"
          aws s3api head-bucket --bucket "$BUILD_ARTIFACTS_BUCKET"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download Lambda runtime assets
        run: |
          mkdir -p layer-root/python/margana_score/data
          aws s3 cp \
            "s3://$STATIC_ASSETS_BUCKET/margana-word-list.txt" \
            "layer-root/python/margana_score/data/margana-word-list.txt"
          test -s "layer-root/python/margana_score/data/margana-word-list.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run tests
        run: pytest

      - name: Build Lambda artifacts
        run: |
          set -euo pipefail

          ARTIFACT_ROOT="$RUNNER_TEMP/lambda-artifacts"
          LAYER_BUILD_ROOT="$RUNNER_TEMP/shared-layer"
          HANDLER_BUILD_ROOT="$RUNNER_TEMP/handler-build"
          ARTIFACT_LIST_FILE="$RUNNER_TEMP/artifact-list.txt"
          SHA_SHORT="${GITHUB_SHA::7}"

          export ARTIFACT_ROOT
          export LAYER_BUILD_ROOT
          export HANDLER_BUILD_ROOT
          export ARTIFACT_LIST_FILE
          export SHA_SHORT

          bash packaging/build_lambda_artifacts.sh

      - name: Upload shared layer artifact to S3
        run: |
          set -euo pipefail

          ARTIFACT_ROOT="$RUNNER_TEMP/lambda-artifacts"
          SHA_SHORT="${GITHUB_SHA::7}"
          S3_PREFIX="${BUILD_ARTIFACTS_PREFIX}/${DEPLOY_ENV}/${SHA_SHORT}"

          while IFS= read -r artifact_name; do
            aws s3 cp \
              "$ARTIFACT_ROOT/$artifact_name" \
              "s3://$BUILD_ARTIFACTS_BUCKET/$S3_PREFIX/$artifact_name"
          done < "$RUNNER_TEMP/artifact-list.txt"
