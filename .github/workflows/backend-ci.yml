name: Backend CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    environment: preprod

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      STATIC_ASSETS_BUCKET: ${{ vars.STATIC_ASSETS_BUCKET }}
      BUILD_ARTIFACTS_BUCKET: ${{ vars.BUILD_ARTIFACTS_BUCKET }}
      BUILD_ARTIFACTS_PREFIX: ${{ vars.BUILD_ARTIFACTS_PREFIX }}
      PYTHON_VERSION: "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Verify bucket access
        run: |
          aws s3api head-bucket --bucket "$STATIC_ASSETS_BUCKET"
          aws s3api head-bucket --bucket "$BUILD_ARTIFACTS_BUCKET"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download Lambda runtime assets
        run: |
          mkdir -p layer-root/python/margana_score/data
          aws s3 cp \
            "s3://$STATIC_ASSETS_BUCKET/margana-word-list.txt" \
            "layer-root/python/margana_score/data/margana-word-list.txt"
          test -s "layer-root/python/margana_score/data/margana-word-list.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run tests
        run: pytest

      - name: Build shared layer artifact
        run: |
          set -euo pipefail

          ARTIFACT_ROOT="$RUNNER_TEMP/lambda-artifacts"
          LAYER_ROOT="$RUNNER_TEMP/shared-layer"
          SHA_SHORT="${GITHUB_SHA::7}"
          LAYER_ARTIFACT_NAME="shared-python-deps-layer__${SHA_SHORT}.zip"
          LAYER_ARTIFACT_PATH="$ARTIFACT_ROOT/$LAYER_ARTIFACT_NAME"

          rm -rf "$ARTIFACT_ROOT" "$LAYER_ROOT"
          mkdir -p "$ARTIFACT_ROOT" "$LAYER_ROOT/python"

          python -m pip install --no-deps . --target "$LAYER_ROOT/python"
          python -m pip install "boto3>=1.28,<2.0" --target "$LAYER_ROOT/python"

          test -s "$LAYER_ROOT/python/margana_metrics/badge-milestones.json"
          test -s "$LAYER_ROOT/python/margana_score/data/margana-word-list.txt"

          (
            cd "$LAYER_ROOT"
            zip -qr "$LAYER_ARTIFACT_PATH" python
          )

          printf '%s\n' "$LAYER_ARTIFACT_NAME" > "$RUNNER_TEMP/artifact-list.txt"

      - name: Build thin handler artifact - submission
        run: |
          set -euo pipefail

          ARTIFACT_ROOT="$RUNNER_TEMP/lambda-artifacts"
          HANDLER_BUILD_ROOT="$RUNNER_TEMP/handler-build"
          SHA_SHORT="${GITHUB_SHA::7}"

          LOGICAL_NAME="submission"
          SOURCE_FILE="lambda_submission.py"
          STAGE_DIR="$HANDLER_BUILD_ROOT/$LOGICAL_NAME"
          ARTIFACT_NAME="${LOGICAL_NAME}__${SHA_SHORT}.zip"
          ARTIFACT_PATH="$ARTIFACT_ROOT/$ARTIFACT_NAME"

          rm -rf "$STAGE_DIR"
          mkdir -p "$STAGE_DIR"

          cp "lambdas/$SOURCE_FILE" "$STAGE_DIR/$SOURCE_FILE"
          test -s "$STAGE_DIR/$SOURCE_FILE"

          (
            cd "$STAGE_DIR"
            zip -qr "$ARTIFACT_PATH" .
          )

          printf '%s\n' "$ARTIFACT_NAME" >> "$RUNNER_TEMP/artifact-list.txt

      - name: Upload shared layer artifact to S3
        run: |
          set -euo pipefail

          ARTIFACT_ROOT="$RUNNER_TEMP/lambda-artifacts"
          SHA_SHORT="${GITHUB_SHA::7}"
          S3_PREFIX="${BUILD_ARTIFACTS_PREFIX}/preprod/${SHA_SHORT}"

          while IFS= read -r artifact_name; do
            aws s3 cp \
              "$ARTIFACT_ROOT/$artifact_name" \
              "s3://$BUILD_ARTIFACTS_BUCKET/$S3_PREFIX/$artifact_name"
          done < "$RUNNER_TEMP/artifact-list.txt"
